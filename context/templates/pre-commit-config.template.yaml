# Pre-commit configuration — Gartner governance checkpoint #2 (pre-commit/push)
# Source: context/governance.md — runs the same tools as the generation hooks and CI/CD.
# Install: pipx install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
#
# {{PROJECT_NAME}} — generated by startup scaffolder

repos:
  # ─── Hygiene ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Secret detection (Secure invariant) ─────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── Conventional commits (Auditable invariant) ──────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, test, refactor, chore, perf, ci, build, revert]

  # ─── .NET (only if backend selected) ─────────────────────────────────
  # {{IF_DOTNET}}
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format --verify-no-changes --no-restore
        language: system
        pass_filenames: false
        files: \.(cs|csproj|sln)$
      - id: dotnet-test
        name: dotnet test (changed projects)
        entry: dotnet test --no-restore --nologo --verbosity quiet
        language: system
        pass_filenames: false
        files: \.cs$
        stages: [pre-push]
  # {{/IF_DOTNET}}

  # ─── Frontend (only if frontend selected) ────────────────────────────
  # {{IF_FRONTEND}}
  - repo: local
    hooks:
      - id: pnpm-lint
        name: pnpm lint
        entry: pnpm lint
        language: system
        pass_filenames: false
        files: \.(ts|tsx|js|jsx)$
      - id: pnpm-typecheck
        name: pnpm typecheck
        entry: pnpm typecheck
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
      - id: pnpm-test
        name: pnpm test (changed)
        entry: pnpm test --run --changed
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        stages: [pre-push]
  # {{/IF_FRONTEND}}

  # ─── Terraform (only if infra selected) ──────────────────────────────
  # {{IF_TERRAFORM}}
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
  # {{/IF_TERRAFORM}}
